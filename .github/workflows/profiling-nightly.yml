name: Profiling Nightly

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  profile-nightly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'
      - name: Run profiling suite
        run: |
          python scripts/profile_kernels.py \
            --n-observers 4000 \
            --repeats 3 \
            --output profiling/latest_nightly.json \
            --output-dir profiling/nightly_artifacts
      - name: Run end-to-end getB JIT profiling
        run: |
          python scripts/profile_getB_jit.py \
            --repeats 3 \
            --output profiling/getB_jit_nightly.json \
            --output-dir profiling/getB_jit_nightly_artifacts
      - name: Check getB JIT thresholds
        run: |
          python scripts/check_profiling_thresholds.py \
            profiling/getB_jit_nightly.json \
            profiling/thresholds_getB_jit.json
      - name: Check getB JIT HLO baseline (report-only)
        continue-on-error: true
        run: |
          python scripts/check_hlo_diffs.py \
            profiling/getB_jit_nightly.json \
            profiling/hlo_baseline_getB_jit.json
      - name: Check nightly thresholds
        run: |
          python scripts/check_profiling_thresholds.py \
            profiling/latest_nightly.json \
            profiling/thresholds.json
      - name: Check HLO hash baseline (report-only)
        continue-on-error: true
        run: |
          python scripts/check_hlo_diffs.py \
            profiling/latest_nightly.json \
            profiling/hlo_baseline.json
      - name: Summarize nightly deltas
        run: |
          python scripts/summarize_profiling.py \
            profiling/latest_nightly.json \
            profiling/thresholds.json \
            --output profiling/latest_nightly_summary.json
      - name: Upload nightly artifacts
        uses: actions/upload-artifact@v4
        with:
          name: profiling-nightly-artifacts
          path: |
            profiling/latest_nightly.json
            profiling/latest_nightly_summary.json
            profiling/nightly_artifacts
            profiling/getB_jit_nightly.json
            profiling/getB_jit_nightly_artifacts
