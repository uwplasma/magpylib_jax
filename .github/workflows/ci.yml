name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-and-types:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'
          python -m pip install ruff
      - name: Ruff
        run: ruff check src tests

  test-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'
      - name: Run fast validation tests
        run: |
          pytest --no-cov \
            tests/jit/test_getB_jit.py \
            tests/parity_gates \
            tests/upstream_mirror/test_getBH_interfaces.py

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      JAX_ENABLE_X64: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[docs]'
      - name: Build docs
        run: sphinx-build -W -b html docs docs/_build/html

  profiling-getb-jit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'
      - name: Run end-to-end getB JIT profiling
        run: |
          python scripts/profile_getB_jit.py \
            --repeats 1 \
            --output profiling/getB_jit_ci.json \
            --output-dir profiling/getB_jit_ci_artifacts
      - name: Validate getB JIT profiling thresholds
        run: |
          python scripts/check_profiling_thresholds.py \
            profiling/getB_jit_ci.json \
            profiling/thresholds_getB_jit.json
      - name: Validate getB JIT HLO baseline
        run: |
          python scripts/check_hlo_diffs.py \
            profiling/getB_jit_ci.json \
            profiling/hlo_baseline_getB_jit.json
      - name: Upload getB JIT profiling artifacts
        uses: actions/upload-artifact@v4
        with:
          name: profiling-getB-jit-ci
          path: |
            profiling/getB_jit_ci.json
            profiling/getB_jit_ci_artifacts
