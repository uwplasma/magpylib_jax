name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'
      - name: Run tests
        run: pytest
      - name: Run strict parity gates
        run: pytest -m parity_gate

  lint-and-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'
          python -m pip install ruff mypy
      - name: Ruff
        run: ruff check src tests
      - name: Mypy
        run: mypy

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[docs]'
      - name: Build docs
        run: sphinx-build -W -b html docs docs/_build/html

  benchmark-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'
      - name: Run benchmark
        run: |
          python scripts/benchmark_vs_magpylib.py \
            --n-observers 2000 \
            --repeats 2 \
            --output benchmarks/latest.json
      - name: Validate thresholds
        run: python scripts/check_benchmark_thresholds.py benchmarks/latest.json benchmarks/thresholds.json

  profiling-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'
      - name: Run kernel profiling report
        run: |
          python scripts/profile_kernels.py \
            --n-observers 600 \
            --repeats 1 \
            --output profiling/latest_ci.json \
            --output-dir profiling/ci_artifacts
      - name: Validate profiling thresholds
        run: |
          python scripts/check_profiling_thresholds.py \
            profiling/latest_ci.json \
            profiling/thresholds.json
      - name: Summarize profiling deltas
        run: |
          python scripts/summarize_profiling.py \
            profiling/latest_ci.json \
            profiling/thresholds.json \
            --output profiling/latest_ci_summary.json
      - name: Upload profiling artifacts
        uses: actions/upload-artifact@v4
        with:
          name: profiling-ci-artifacts
          path: profiling/ci_artifacts
      - name: Upload profiling summary
        uses: actions/upload-artifact@v4
        with:
          name: profiling-ci-summary
          path: profiling/latest_ci_summary.json
