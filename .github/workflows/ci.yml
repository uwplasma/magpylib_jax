name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint-and-types:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'
          python -m pip install ruff mypy
      - name: Ruff
        run: ruff check src tests
      - name: Mypy
        run: mypy

  tests-shard-a:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      COVERAGE_FILE: .coverage.shard_a
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'
      - name: Run test shard A
        run: >
          pytest -o addopts='-ra --strict-config --strict-markers
          --cov=src/magpylib_jax --cov-append --cov-report='
          tests/differentiability tests/jit tests/parity tests/parity_gates
          tests/physics tests/performance
      - name: Upload coverage shard A
        uses: actions/upload-artifact@v4
        with:
          name: coverage-shard-a
          path: .coverage.shard_a

  tests-shard-b:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      COVERAGE_FILE: .coverage.shard_b
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'
      - name: Run test shard B
        run: >
          pytest -o addopts='-ra --strict-config --strict-markers
          --cov=src/magpylib_jax --cov-append --cov-report='
          tests/test_compatibility.py tests/test_coverage_smoke.py
          tests/test_motion_shape_compat.py tests/test_trimesh_semantics.py
      - name: Upload coverage shard B
        uses: actions/upload-artifact@v4
        with:
          name: coverage-shard-b
          path: .coverage.shard_b

  tests-shard-c:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      COVERAGE_FILE: .coverage.shard_c
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'
      - name: Run test shard C
        run: >
          pytest -o addopts='-ra --strict-config --strict-markers
          --cov=src/magpylib_jax --cov-append --cov-report='
          tests/upstream_mirror
      - name: Upload coverage shard C
        uses: actions/upload-artifact@v4
        with:
          name: coverage-shard-c
          path: .coverage.shard_c

  coverage-combine:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - tests-shard-a
      - tests-shard-b
      - tests-shard-c
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install coverage tool
        run: |
          python -m pip install --upgrade pip
          python -m pip install coverage[toml]
      - name: Download coverage shard A
        uses: actions/download-artifact@v4
        with:
          name: coverage-shard-a
          path: coverage/shard_a
      - name: Download coverage shard B
        uses: actions/download-artifact@v4
        with:
          name: coverage-shard-b
          path: coverage/shard_b
      - name: Download coverage shard C
        uses: actions/download-artifact@v4
        with:
          name: coverage-shard-c
          path: coverage/shard_c
      - name: Combine and enforce coverage
        run: |
          python -m coverage combine coverage/shard_a coverage/shard_b coverage/shard_c
          python -m coverage report --fail-under=90

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      JAX_ENABLE_X64: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[docs]'
      - name: Build docs
        run: sphinx-build -W -b html docs docs/_build/html

  benchmark-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'
      - name: Run benchmark
        run: |
          python scripts/benchmark_vs_magpylib.py \
            --n-observers 600 \
            --repeats 1 \
            --output benchmarks/latest.json
      - name: Validate thresholds
        run: python scripts/check_benchmark_thresholds.py benchmarks/latest.json benchmarks/thresholds.json

  profiling-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'
      - name: Run kernel profiling report
        run: |
          python scripts/profile_kernels.py \
            --n-observers 400 \
            --repeats 1 \
            --output profiling/latest_ci.json \
            --output-dir profiling/ci_artifacts
      - name: Validate profiling thresholds
        run: |
          python scripts/check_profiling_thresholds.py \
            profiling/latest_ci.json \
            profiling/thresholds.json
      - name: Validate HLO baseline
        run: |
          python scripts/check_hlo_diffs.py \
            profiling/latest_ci.json \
            profiling/hlo_baseline.json
      - name: Summarize profiling deltas
        run: |
          python scripts/summarize_profiling.py \
            profiling/latest_ci.json \
            profiling/thresholds.json \
            --output profiling/latest_ci_summary.json
      - name: Upload profiling artifacts
        uses: actions/upload-artifact@v4
        with:
          name: profiling-ci-artifacts
          path: |
            profiling/latest_ci.json
            profiling/latest_ci_summary.json
            profiling/ci_artifacts

  profiling-getb-jit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test]'
      - name: Run end-to-end getB JIT profiling
        run: |
          python scripts/profile_getB_jit.py \
            --repeats 1 \
            --output profiling/getB_jit_ci.json \
            --output-dir profiling/getB_jit_ci_artifacts
      - name: Validate getB JIT profiling thresholds
        run: |
          python scripts/check_profiling_thresholds.py \
            profiling/getB_jit_ci.json \
            profiling/thresholds_getB_jit.json
      - name: Validate getB JIT HLO baseline
        run: |
          python scripts/check_hlo_diffs.py \
            profiling/getB_jit_ci.json \
            profiling/hlo_baseline_getB_jit.json
      - name: Upload getB JIT profiling artifacts
        uses: actions/upload-artifact@v4
        with:
          name: profiling-getB-jit-ci
          path: |
            profiling/getB_jit_ci.json
            profiling/getB_jit_ci_artifacts
