name: Full Validation

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  full-tests-and-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      JAX_ENABLE_X64: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[test,docs]'
      - name: Run full test suite (coverage + parity mirrors)
        run: pytest
      - name: Build docs (strict)
        run: sphinx-build -W -b html docs docs/_build/html
      - name: Run benchmark report
        run: |
          python scripts/benchmark_vs_magpylib.py \
            --n-observers 2000 \
            --repeats 2 \
            --output benchmarks/nightly.json
      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: nightly-benchmark-report
          path: benchmarks/nightly.json
